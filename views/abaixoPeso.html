<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC - Abaixo do Peso</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Resultado</h1>
        <div id="dados"></div>
        <button onclick="voltar()">Voltar</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('dados').innerHTML = `
            <p><strong>Nome:</strong> ${params.get('nome')}</p>
            <p><strong>Peso:</strong> ${params.get('peso')} kg</p>
            <p><strong>Altura:</strong> ${params.get('altura')} m</p>
            <p><strong>Classificação:</strong> ${params.get('classificacao')}</p>
            <p><strong>Mensagem:</strong> ${params.get('mensagem')}</p>
        `;
        function voltar() { window.location.href = "/"; }
    </script>
</body>
</html>
