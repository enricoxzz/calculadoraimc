<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações sobre o IMC</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Sobre o IMC</h1>

        <p>O IMC (Índice de Massa Corporal) é uma forma simples de avaliar se uma pessoa está com o peso adequado.</p>

        <h2>Fórmula</h2>
        <p>IMC = peso / (altura × altura)</p>

        <h2>Classificação</h2>
        <ul>
            <li><strong>Abaixo de 18.5:</strong> Abaixo do peso</li>
            <li><strong>18.5 até 24.9:</strong> Peso normal</li>
            <li><strong>25 até 29.9:</strong> Sobrepeso</li>
            <li><strong>30 ou mais:</strong> Obesidade</li>
        </ul>

        <button onclick="window.location.href='/'">Voltar</button>
    </div>
</body>
</html>
